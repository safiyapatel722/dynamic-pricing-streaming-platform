services:

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

  simulator:
    build: .
    command: python -m ingestion.simulator
    env_file: .env
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    restart: unless-stopped

  consumer:
    build: .
    command: python -m processing.consumer
    env_file: .env
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    restart: unless-stopped
    depends_on:
      - redis

  archiver:
    build: .
    command: python -m storage.archiver
    env_file: .env
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    restart: unless-stopped

  api:
    build: .
    command: python -m serving.api
    env_file: .env
    ports:
      - "8081:8080"
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    restart: unless-stopped
    depends_on:
      - redis

  bigquery-loader:
    build: .
    command: python -m bigquery.loader
    env_file: .env
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/credentials.json
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
    restart: unless-stopped
    depends_on:
      - redis